<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ORG PORTAL // Semhal Ledger</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .portal-container { max-width: 1000px; margin: 3rem auto; padding: 1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 2rem; border-radius: 12px; }
        .submit-input { width: 100%; padding: 0.8rem; background: #0d1117; border: 1px solid #00f2ff; color: #fff; margin-bottom: 1rem; }
        .table-style { width: 100%; border-collapse: collapse; margin-top: 1rem; color: #fff; }
        .table-style th { border-bottom: 2px solid #00f2ff; padding: 10px; }
        .table-style td { padding: 10px; border-bottom: 1px solid #30363d; }
    </style>
</head>
<body>
    <div class="portal-container">
        <h1>Organization Dashboard</h1>
        <p>Wallet: {{ address }} | Balance: {{ balance }} sUSD</p>

        <div class="grid">
            <div class="box">
                <h3>Bulk Payment</h3>
                <input type="file" id="csvFile" accept=".csv" class="submit-input">
                <textarea id="manualInput" class="submit-input" placeholder="0xAddress,Amount (one per line)" rows="5"></textarea>
                <button class="action-btn" onclick="processBulk()">DISPATCH ALL</button>
            </div>

            <div class="box">
                <h3>Payment History</h3>
                <table class="table-style" id="historyTable">
                    <thead><tr><th>Recipient</th><th>Amount</th><th>Status</th><th>PDF</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function processBulk() {
            // Logic to parse textarea, call /api/transfer for each line
            alert("Executing batch transfer...");
        }
        
        // Mock PDF Printer
        function generatePDF(txId) {
            window.print(); // Simplest way to trigger browser PDF print
        }
    </script>
</body>
</html>
