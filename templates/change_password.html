<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURITY UPDATE // Semhal Ledger</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { 
            background-color: #0d1117; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .box { 
            background: #161b22; 
            border: 1px solid #00f2ff; 
            padding: 2.5rem; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }
        .submit-input { 
            width: 100%; 
            padding: 0.8rem; 
            background: #0d1117; 
            border: 1px solid #30363d; 
            color: #fff; 
            margin-bottom: 1rem; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }
        .action-btn { 
            width: 100%; 
            background: #00f2ff; 
            color: #000; 
            font-weight: bold; 
            padding: 0.85rem; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: background 0.3s ease;
        }
        .action-btn:hover { background: #00b9c3; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #00f2ff; margin-top: 0;">Security Update Required</h2>
        <p style="color: #8b949e; font-size: 0.9rem; margin-bottom: 2rem;">
            As an organization user, you must update your portal password to activate your account and access the bulk dispatch tools.
        </p>
        <form method="POST">
            <input type="password" name="new_password" class="submit-input" placeholder="Enter New Secure Password" required>
            <button type="submit" class="action-btn">ACTIVATE ACCOUNT</button>
        </form>
    </div>
</body>
</html>
