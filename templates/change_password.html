<div class="box">
    <h2 style="color: #00f2ff; margin-top: 0;">Security Update Required</h2>
    <p style="color: #8b949e; font-size: 0.9rem; margin-bottom: 2rem;">
        As an organization user, you must update your portal password to activate your account and access the bulk dispatch tools.
    </p>
    <form action="/auth/update-password" method="POST">
        <input type="password" name="new_password" class="submit-input" placeholder="Enter New Secure Password" required>
        <button type="submit" class="action-btn">ACTIVATE ACCOUNT</button>
    </form>
</div>
