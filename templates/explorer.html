<table class="ledger-table">
    <thead>
        <tr>
            <th>Cryptographic Address Target</th>
            <th class="text-right">Allocation Balance (SUSD)</th>
        </tr>
    </thead>
    <tbody>
        {{ range .ledger }}
        <tr>
            <td class="addr">{{ .Address }}</td>
            <td class="val">{{ .Balance }}</td>
        </tr>
        {{ end }}
    </tbody>
</table>
