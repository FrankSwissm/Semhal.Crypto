<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NETWORK EXPLORER // Semhal Ledger</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .explorer-table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
        .explorer-table th { text-align: left; padding: 1rem; border-bottom: 2px solid var(--border-glow); color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; }
        .explorer-table td { padding: 1rem; border-bottom: 1px solid #30363d; font-family: var(--font-mono); }
        .status-pill { background: rgba(0, 255, 163, 0.1); color: #00ffa3; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo">SEMHAL <span>LEDGER</span></div>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/explorer" class="active">Network Explorer</a>
            <a href="/docs">Integration Architecture</a>
            <a href="/ussd">USSD Gateway</a>
            <a href="/core">System Core</a>
            <a href="/markets">Market Monitor</a>
            <a href="/news">Network News</a>
        </nav>
    </header>

    <div class="container">
        <h1>Network Explorer</h1>
        <p style="color: var(--text-secondary);">Real-time visualization of the Semhal global ledger state.</p>

        <table class="explorer-table">
            <thead>
                <tr>
                    <th>Node Address</th>
                    <th>Balance (sUSD)</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="ledger-body">
                <tr>
                    <td colspan="3" style="text-align: center; padding: 2rem;">Loading ledger data...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        async function fetchLedger() {
            try {
                const response = await fetch('/api/ledger');
                const accounts = await response.json();
                const tbody = document.getElementById('ledger-body');

                if (accounts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 2rem;">No nodes detected in current epoch.</td></tr>';
                    return;
                }

                tbody.innerHTML = accounts.map(acc => `
                    <tr>
                        <td style="color: var(--accent-cyan);">${acc.address}</td>
                        <td>${acc.balance.toFixed(2)}</td>
                        <td><span class="status-pill">ACTIVE</span></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Failed to fetch ledger:", err);
                document.getElementById('ledger-body').innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 2rem; color: #ff4a4a;">Error loading ledger.</td></tr>';
            }
        }

        // Fetch immediately on load
        fetchLedger();
    </script>
</body>
</html>
