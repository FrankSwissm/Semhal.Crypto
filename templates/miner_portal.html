<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MINER PORTAL // Semhal Network</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .portal-container { max-width: 900px; margin: 3rem auto; }
        .miner-banner { background: linear-gradient(135deg, #0b1511 0%, #111e17 100%); border: 1px solid rgba(0, 255, 163, 0.2); padding: 2.5rem; border-radius: 12px; margin-bottom: 2rem; }
        .address-bar { font-family: var(--font-mono); background: rgba(0,0,0,0.4); padding: 0.75rem 1rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); color: #a4a8b6; margin-top: 0.5rem; display: inline-block; font-size: 0.85rem; word-break: break-all; }
        .mining-box { background: var(--surface-card); border: 1px solid var(--border-glow); padding: 2rem; border-radius: 12px; text-align: center; }
        .balance-display { font-size: 2rem; font-weight: bold; color: var(--accent-gold); margin: 1rem 0; font-family: var(--font-mono); }
        .hash-rate { font-size: 1.5rem; font-weight: bold; color: var(--accent-cyan); margin: 1rem 0; font-family: var(--font-mono); }
        .action-btn { width: 100%; background: #00ffa3; color: #000; font-weight: bold; padding: 0.85rem; border: none; border-radius: 6px; cursor: pointer; font-family: var(--font-mono); text-transform: uppercase; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo">SEMHAL <span>LEDGER</span></div>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/explorer">Network Explorer</a>
            <a href="/docs">Integration Architecture</a>
            <a href="/ussd">USSD Gateway</a>
            <a href="/core">System Core</a>
            <a href="/markets">Market Monitor</a>
            <a href="/news">Network News</a>
        </nav>
        <div class="auth-nav-block">
            <a href="/portal/miner" class="runtime-badge" style="background: rgba(0, 255, 163, 0.15); color: #00ffa3;">MY PORTAL [MINER]</a>
            <a href="/auth/logout" class="logout-btn">Disconnect</a>
        </div>
    </header>

    <div class="container portal-container">
        <div class="miner-banner">
            <h2>Distributed Miner Session</h2>
            <span class="address-bar">{{ address }}</span>
            <div class="balance-display" id="miner-balance">
                Balance: {{ balance }} <span style="font-size:1rem; color:#fff;">sUSD</span>
            </div>
        </div>

        <div class="mining-box">
            <h3 style="font-family: var(--font-mono); text-transform: uppercase; margin-bottom: 1rem;">Block Validation Simulator</h3>
            <div class="hash-rate" id="status-text">STATUS // IDLE</div>
            <button id="mine-btn" class="action-btn">Initialize Local Block Mining</button>
        </div>
    </div>

    <script>
        document.getElementById('mine-btn').onclick = async () => {
            const btn = document.getElementById('mine-btn');
            const status = document.getElementById('status-text');
            
            btn.disabled = true;
            status.innerText = "COMPUTING HASHES...";
            
            const res = await fetch('/api/mine-reward', { method: 'POST' });
            const data = await res.json();
            
            if (data.status === 'success') {
                document.getElementById('miner-balance').innerHTML = 
                    `Balance: ${data.total.toFixed(3)} <span style="font-size:1rem; color:#fff;">sUSD</span>`;
                status.innerText = "STATUS // REWARD GRANTED";
            } else {
                status.innerText = "STATUS // ERROR";
                alert('Mining failed: ' + data.message);
            }
            btn.disabled = false;
        };
    </script>
</body>
</html>
