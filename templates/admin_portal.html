<table class="ledger-table">
    <thead>
        <tr>
            <th>Node Identity Address</th>
            <th>Ledger Balance Allocation</th>
            <th>Administrative Authority</th>
        </tr>
    </thead>
    <tbody>
        {{ range $index, $account := .ledger }}
        <tr id="row-{{ $index }}">
            <td style="color:#fff; word-break:break-all;">{{ $account.Address }}</td>
            <td style="color:var(--accent-gold); font-weight:bold;">{{ $account.Balance }} sUSD</td>
            <td>
                <button class="purge-btn" onclick="purgeNode('{{ $account.Address }}', 'row-{{ $index }}')">Purge Node Record</button>
            </td>
        </tr>
        {{ end }}
    </tbody>
</table>
