<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADMIN PORTAL // Semhal Ledger</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .portal-container { max-width: 900px; margin: 3rem auto; }
        .wallet-banner { background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); border: 1px solid var(--accent-gold); padding: 2.5rem; border-radius: 12px; margin-bottom: 2rem; }
        .balance-display { font-size: 3rem; font-weight: bold; color: var(--accent-gold); margin: 1rem 0; font-family: var(--font-mono); }
        .admin-section { background: var(--surface-card); border: 1px solid var(--border-glow); padding: 2rem; border-radius: 12px; margin-top: 2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; border-bottom: 1px solid var(--border-glow); text-align: left; font-family: var(--font-mono); font-size: 0.85rem; }
        .action-btn { width: 100%; background: var(--accent-gold); color: #000; font-weight: bold; padding: 0.85rem; border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        .submit-input { width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glow); color: #fff; border-radius: 4px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo">SEMHAL <span>LEDGER</span></div>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/explorer">Network Explorer</a>
            <a href="/docs">Integration Architecture</a>
            <a href="/ussd">USSD Gateway</a>
            <a href="/core">System Core</a>
            <a href="/markets">Market Monitor</a>
            <a href="/news">Network News</a>
        </nav>
        <div class="auth-nav-block">
            <a href="/portal/my-portal" class="runtime-badge" style="border-color: var(--accent-gold); color: var(--accent-gold);">MY PORTAL [ADMIN]</a>
            <a href="/auth/logout" class="logout-btn">Disconnect</a>
        </div>
    </header>

    <div class="container portal-container">
        <div class="wallet-banner">
            <h2>Treasury Oversight</h2>
            <div class="balance-display">$48,217,477,500 <span style="font-size:1.5rem; color:#fff;">USD</span></div>
            <button class="action-btn" onclick="alert('Reserves Synced')">Sync Treasury Reserves</button>
        </div>

        <div class="admin-section">
            <h3>SUSD Issuance & Ledger</h3>
            <form id="admin-transfer-form">
                <input type="text" name="receiver" id="target" placeholder="Recipient Address" class="submit-input" required>
                <input type="number" name="amount" id="amount" placeholder="Amount SUSD" class="submit-input" required>
                <button type="submit" class="action-btn">Issue SUSD to Address</button>
            </form>
        </div>

        <div class="admin-section">
            <h3>Active Network Ledger</h3>
            <table>
                <thead><tr><th>Address</th><th>Balance</th><th>Role</th></tr></thead>
                <tbody id="ledger-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchLedger() {
            const res = await fetch('/api/ledger');
            const data = await res.json();
            document.getElementById('ledger-body').innerHTML = data.map(acc => `
                <tr><td>${acc.address}</td><td>${acc.balance}</td><td>${acc.role}</td></tr>
            `).join('');
        }
        document.getElementById('admin-transfer-form').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/api/transfer', { method: 'POST', body: new FormData(e.target) });
            fetchLedger();
        };
        fetchLedger();
    </script>
</body>
</html>
